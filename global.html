<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Global Comparison</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f1f5f9;
transition:.3s;
}

.dark-mode{
background:#020617;
color:white;
}

.dark-mode .card{
background:#0f172a;
color:white;
}

.dark-mode .table{
color:white;
}

.dark-mode .navbar{
background:#020617 !important;
}

.hero{
background:linear-gradient(135deg,#2563eb,#1d4ed8);
border-radius:30px;
}

.card{
border:none;
border-radius:25px;
box-shadow:0 10px 30px rgba(0,0,0,.06);
}

</style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">

<div class="container-fluid">

<a class="navbar-brand fw-bold" href="#">
RevenueHub PH
</a>

<div class="d-flex gap-2">

<a href="index.html" class="btn btn-outline-light">
Dashboard
</a>

<a href="map.html" class="btn btn-outline-light">
Regional
</a>

<button class="btn btn-outline-light" id="themeToggle">
Dark Mode
</button>

</div>

</div>

</nav>

<div class="container-fluid p-4">

<div class="hero text-white p-5 shadow-lg mb-4">

<h1 class="fw-bold">
Global Economic Comparison
</h1>

<p class="lead opacity-75">
Live World Bank API comparison system
</p>

</div>

<div class="card">

<div class="card-body">

<div class="table-responsive">

<table class="table align-middle">

<thead class="table-primary">

<tr>
<th>Country</th>
<th>Population</th>
<th>GDP Growth</th>
<th>Inflation</th>
</tr>

</thead>

<tbody id="table"></tbody>

</table>

</div>

</div>

</div>

</div>

<script>

const country = async code => {

const population =
await fetch(
`https://api.worldbank.org/v2/country/${code}/indicator/SP.POP.TOTL?format=json`
).then(r=>r.json());

const gdp =
await fetch(
`https://api.worldbank.org/v2/country/${code}/indicator/NY.GDP.MKTP.KD.ZG?format=json`
).then(r=>r.json());

const inflation =
await fetch(
`https://api.worldbank.org/v2/country/${code}/indicator/FP.CPI.TOTL.ZG?format=json`
).then(r=>r.json());

return{

name:
population[1][0].country.value,

population:
population[1].find(x=>x.value).value,

gdp:
gdp[1].find(x=>x.value).value,

inflation:
inflation[1].find(x=>x.value).value

};

};

(async()=>{

for(const code of ["PHL","SGP","JPN","KOR","IDN"]){

const c =
await country(code);

document.getElementById("table").innerHTML += `

<tr>

<td class="fw-bold">
${c.name}
</td>

<td>
${(c.population / 1000000).toFixed(1)}M
</td>

<td class="text-success fw-bold">
${c.gdp.toFixed(1)}%
</td>

<td class="text-danger fw-bold">
${c.inflation.toFixed(1)}%
</td>

</tr>

`;

}

})();

const themeToggle =
document.getElementById("themeToggle");

if(localStorage.getItem("theme") === "dark"){

document.body.classList.add("dark-mode");

}

themeToggle.addEventListener("click",()=>{

document.body.classList.toggle("dark-mode");

if(document.body.classList.contains("dark-mode")){

localStorage.setItem("theme","dark");

}

else{

localStorage.setItem("theme","light");

}

});

</script>

</body>
</html>
